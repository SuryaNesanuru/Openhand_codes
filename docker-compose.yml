version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for background jobs
  redis:
    image: redis:7-alpine
    container_name: agent-platform-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: agent-platform-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    deploy:
      resources:
        limits:
          # GPUs: 1  # Uncomment if you have GPU
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Backend API
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: agent-platform-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_platform
      REDIS_URL: redis://localhost:6379
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: changeme-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: agent-platform-web
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - ./packages:/app/packages

volumes:
  postgres_data:
  redis_data:
  ollama_data: